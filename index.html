<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Styvora Admin Panel</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f6f6f6;
    padding:20px;
}
.container{
    max-width:600px;
    margin:auto;
    background:#fff;
    padding:25px;
    border-radius:12px;
    box-shadow:0 10px 30px rgba(0,0,0,0.08);
}
h2{
    text-align:center;
    margin-bottom:20px;
}
input{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    border-radius:8px;
    border:1px solid #ddd;
}
button{
    width:100%;
    padding:14px;
    background:black;
    color:white;
    border:none;
    border-radius:30px;
    font-size:16px;
    cursor:pointer;
}
button:hover{
    background:#333;
}
#status{
    margin-top:15px;
    font-size:14px;
    text-align:center;
}
.result-box{
    margin-top:20px;
    background:#fafafa;
    padding:15px;
    border-radius:8px;
    font-size:14px;
}
</style>
</head>
<body>

<div class="container">

<h2>Styvora Auto Publisher</h2>

<input type="file" id="imageFile" accept="image/*">
<input type="text" id="link" placeholder="Affiliate Link">

<button onclick="publish()">Publish (Auto AI)</button>

<div id="status"></div>

<div id="result" class="result-box" style="display:none;"></div>

</div>

<script>

const WORKER_URL = "https://styvora-publisher.deepkoley156.workers.dev/";

function fileToBase64(file){
    return new Promise((resolve, reject)=>{
        const reader = new FileReader();
        reader.onload = ()=> resolve(reader.result.split(",")[1]);
        reader.onerror = reject;
        reader.readAsDataURL(file);
    });
}

async function publish(){

    const file = document.getElementById("imageFile").files[0];
    const link = document.getElementById("link").value.trim();
    const status = document.getElementById("status");
    const resultBox = document.getElementById("result");

    if(!file){
        alert("Upload image first");
        return;
    }

    if(!link){
        alert("Enter affiliate link");
        return;
    }

    status.innerHTML = "⏳ Processing... (AI generating content)";
    resultBox.style.display = "none";

    try{

        const base64 = await fileToBase64(file);

        const res = await fetch(WORKER_URL,{
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({
                affiliateLink: link,
                imageBase64: base64,
                imageMimeType: file.type,
                imageName: file.name
            })
        });

        const data = await res.json();

        if(!data.success){
            status.innerHTML = "❌ Error: " + data.error;
            return;
        }

        status.innerHTML = "✅ Published Successfully!";

        resultBox.style.display = "block";
        resultBox.innerHTML = `
<b>Page:</b><br>
<a href="${data.pageUrl}" target="_blank">${data.pageUrl}</a><br><br>

<b>Title:</b><br>${data.title}<br><br>

<b>Description:</b><br>${data.description}<br><br>

<b>Hashtags:</b><br>${data.hashtags}<br><br>

<b>RSS:</b><br>
<a href="${data.rssUrl}" target="_blank">${data.rssUrl}</a>
`;

    }catch(err){
        status.innerHTML = "❌ Failed: " + err.message;
    }

}

</script>

</body>
</html>
