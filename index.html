<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Styvora Landing Page Generator</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f4f4;
    padding:20px;
}
.container{
    max-width:700px;
    margin:auto;
    background:#fff;
    padding:20px;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}
h2{
    text-align:center;
    margin-bottom:20px;
}
input, textarea{
    width:100%;
    padding:10px;
    margin-bottom:15px;
    border-radius:6px;
    border:1px solid #ccc;
}
button{
    background:black;
    color:white;
    padding:12px;
    width:100%;
    border:none;
    border-radius:30px;
    font-size:16px;
    cursor:pointer;
}
button:hover{
    background:#333;
}
</style>
</head>
<body>

<div class="container">
<h2>Styvora Landing Page Generator</h2>

<input type="text" id="title" placeholder="Product Title">
<input type="file" id="imageFile" accept="image/*">
<textarea id="description" placeholder="Product Description"></textarea>
<textarea id="specs" placeholder="Specifications (one per line)"></textarea>
<input type="text" id="link" placeholder="Affiliate Link">
<input type="text" id="filename" placeholder="Slug (example: product-1)">

<button onclick="generateHTML()">Generate HTML Code</button>
<button onclick="publishToGitHub()">Publish to GitHub (Auto)</button>

</div>

<script>

const WORKER_API_URL = "https://styvora-publisher.deepkoley156.workers.dev/";

let generatedCode = "";

function generateHTML(){

let title = document.getElementById("title").value.trim();
let description = document.getElementById("description").value
                    .trim()
                    .replaceAll("\n","<br>");
let specs = document.getElementById("specs").value.split("\n");
let link = document.getElementById("link").value.trim();
let slug = document.getElementById("filename").value.trim();

if(!slug){
    alert("Enter slug first!");
    return;
}

let specList = "";
specs.forEach(item=>{
    if(item.trim() !== ""){
        specList += `<li>${item.trim()}</li>\n`;
    }
});

generatedCode = `
<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Styvora | ${title}</title>
<meta name="description" content="${description.replaceAll("<br>"," ")}">
</head>
<body style="font-family:Arial;padding:20px;max-width:700px;margin:auto;">

<h1>${title}</h1>

<img src="images/${slug}.jpg" style="max-width:100%;height:auto;border-radius:8px;">

<p>${description}</p>

<ul>
${specList}
</ul>

<a href="${link}" target="_blank"
style="display:inline-block;padding:12px 20px;background:black;color:white;
text-decoration:none;border-radius:30px;margin-top:15px;">
BUY NOW
</a>

</body>
</html>
`;

alert("HTML Generated Successfully!");
}

async function publishToGitHub(){

let slug = document.getElementById("filename").value.trim();
let imageFile = document.getElementById("imageFile").files[0];

if(!slug){
    alert("Enter slug!");
    return;
}

if(!generatedCode){
    alert("Generate HTML first!");
    return;
}

if(!imageFile){
    alert("Select image!");
    return;
}

let reader = new FileReader();
reader.readAsDataURL(imageFile);

reader.onload = async function(){

    let base64Image = reader.result.split(",")[1];

    try{

        let response = await fetch(WORKER_API_URL,{
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({
                slug: slug,
                content: generatedCode,
                imageContent: base64Image
            })
        });

        let result = await response.json();

        if(result.success){
            alert("Published Successfully!\n\n" + result.url);
        }else{
            alert("Error: " + result.error);
        }

    }catch(error){
        alert("Publish Failed:\n" + error.message);
    }

};

}

</script>

</body>
</html>
