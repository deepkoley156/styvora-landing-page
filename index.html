<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Styvora Auto Publisher</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      color: #111;
      padding: 20px;
    }

    .wrap {
      max-width: 720px;
      margin: auto;
      background: #fff;
      padding: 24px;
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
      position: relative;
    }

    h1 {
      margin: 0 0 20px;
      text-align: center;
      font-size: 24px;
    }

    label {
      display: block;
      font-size: 14px;
      margin-bottom: 8px;
      font-weight: 600;
    }

    input[type="url"],
    input[type="file"],
    input[type="text"],
    select {
      width: 100%;
      padding: 12px;
      margin-bottom: 16px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 15px;
      background: #fff;
    }

    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 999px;
      background: #111;
      color: #fff;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #333;
    }

    .status {
      margin-top: 18px;
      padding: 14px;
      border-radius: 8px;
      background: #f7f7f7;
      font-size: 14px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .gear-btn {
      position: absolute;
      top: 18px;
      right: 18px;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: #f0f0f0;
      color: #111;
      border: 1px solid #ddd;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .gear-btn:hover {
      background: #e8e8e8;
    }

    .settings-box {
      display: none;
      margin-bottom: 20px;
      padding: 16px;
      border: 1px solid #eee;
      border-radius: 10px;
      background: #fafafa;
    }

    .settings-box.show {
      display: block;
    }

    .small-note {
      font-size: 12px;
      color: #666;
      margin-top: -8px;
      margin-bottom: 12px;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <button class="gear-btn" type="button" onclick="toggleSettings()">⚙️</button>

    <h1>Styvora Auto Publisher</h1>

    <div id="settingsBox" class="settings-box">
      <label for="aiProvider">AI Provider</label>
      <select id="aiProvider">
        <option value="auto">Auto (Gemini → OpenRouter)</option>
        <option value="gemini">Gemini Only</option>
        <option value="openrouter">OpenRouter Only</option>
      </select>
      <div class="small-note">
        Auto mode will try Gemini first. If it fails, OpenRouter will be used.
      </div>

      <label for="focusProduct">Focus Product</label>
      <input type="text" id="focusProduct" placeholder="Example: nose pin / saree / earring / necklace" />
      <div class="small-note">
        AI will prioritize this product while generating title, description, and hashtags.
      </div>
    </div>

    <label for="imageFile">Upload Product Image</label>
    <input type="file" id="imageFile" accept="image/*" />

    <label for="affiliateLink">Affiliate Link</label>
    <input type="url" id="affiliateLink" placeholder="Paste affiliate link" />

    <button onclick="publishProduct()">Publish (Auto AI)</button>

    <div class="status" id="statusBox">Ready.</div>
  </div>

  <script>
    const WORKER_URL = "https://styvora-publisher.deepkoley156.workers.dev/";

    function setStatus(text) {
      document.getElementById("statusBox").textContent = text;
    }

    function toggleSettings() {
      document.getElementById("settingsBox").classList.toggle("show");
    }

    function fileToBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result.split(",")[1]);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    async function publishProduct() {
      const affiliateLink = document.getElementById("affiliateLink").value.trim();
      const imageFile = document.getElementById("imageFile").files[0];
      const aiProvider = document.getElementById("aiProvider").value;
      const focusProduct = document.getElementById("focusProduct").value.trim();

      if (!affiliateLink) {
        setStatus("Please enter affiliate link.");
        return;
      }

      if (!imageFile) {
        setStatus("Please upload image.");
        return;
      }

      try {
        setStatus("Uploading image and generating smart content...");

        const imageBase64 = await fileToBase64(imageFile);

        const response = await fetch(WORKER_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            affiliateLink,
            imageBase64,
            imageMimeType: imageFile.type || "image/jpeg",
            imageName: imageFile.name || "product.jpg",
            aiProvider,
            focusProduct
          })
        });

        const result = await response.json();

        if (!response.ok || !result.success) {
          throw new Error(result.error || "Publish failed");
        }

        setStatus(
`Published successfully!

AI Provider Used:
${result.aiProvider}

Focus Product:
${result.focusProduct || "Not set"}

Page URL:
${result.pageUrl}

RSS:
${result.rssUrl}

Title:
${result.title}

Description:
${result.description}

Hashtags:
${result.hashtags}

Slug:
${result.slug}`
        );
      } catch (err) {
        setStatus("❌ Error: " + err.message);
      }
    }
  </script>
</body>
</html>
