<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Styvora Admin Panel</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      color: #111;
      padding: 20px;
    }
    .wrap {
      max-width: 680px;
      margin: auto;
      background: #fff;
      padding: 24px;
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    }
    h1 {
      margin: 0 0 20px;
      text-align: center;
      font-size: 24px;
    }
    label {
      display: block;
      font-size: 14px;
      margin-bottom: 8px;
      font-weight: 600;
    }
    input[type="url"],
    input[type="file"] {
      width: 100%;
      padding: 12px;
      margin-bottom: 16px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 15px;
    }
    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 999px;
      background: #111;
      color: #fff;
      font-size: 16px;
      cursor: pointer;
    }
    button:hover {
      background: #333;
    }
    .status {
      margin-top: 18px;
      padding: 14px;
      border-radius: 8px;
      background: #f7f7f7;
      font-size: 14px;
      white-space: pre-wrap;
      word-break: break-word;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Styvora Admin Panel</h1>

    <label for="affiliateLink">Affiliate Link</label>
    <input type="url" id="affiliateLink" placeholder="Paste affiliate link">

    <label for="imageFile">Upload Product Image</label>
    <input type="file" id="imageFile" accept="image/*">

    <button onclick="publishProduct()">Submit</button>

    <div class="status" id="statusBox">Ready.</div>
  </div>

  <script>
    const WORKER_URL = "https://styvora-publisher.deepkoley156.workers.dev/";

    function setStatus(text) {
      document.getElementById("statusBox").textContent = text;
    }

    function fileToBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result.split(",")[1]);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    async function publishProduct() {
      const affiliateLink = document.getElementById("affiliateLink").value.trim();
      const imageFile = document.getElementById("imageFile").files[0];

      if (!affiliateLink) {
        setStatus("Please enter affiliate link.");
        return;
      }

      if (!imageFile) {
        setStatus("Please upload image.");
        return;
      }

      try {
        setStatus("Uploading image and processing...");

        const imageBase64 = await fileToBase64(imageFile);

        const response = await fetch(WORKER_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            affiliateLink,
            imageBase64,
            imageMimeType: imageFile.type || "image/jpeg",
            imageName: imageFile.name || "product.jpg"
          })
        });

        const result = await response.json();

        if (!response.ok || !result.success) {
          throw new Error(result.error || "Publish failed");
        }

        setStatus(
`Published successfully!

Page URL:
${result.pageUrl}

RSS:
${result.rssUrl}

Title:
${result.title}

Description:
${result.description}

Hashtags:
${result.hashtags}

Slug:
${result.slug}`
        );
      } catch (err) {
        setStatus("Error:\n" + err.message);
      }
    }
  </script>
</body>
</html>
