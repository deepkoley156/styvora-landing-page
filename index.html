<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Styvora Landing Page Generator</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f4f4;
    padding:20px;
}
.container{
    max-width:700px;
    margin:auto;
    background:#fff;
    padding:20px;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}
h2{
    text-align:center;
    margin-bottom:20px;
}
input, textarea{
    width:100%;
    padding:10px;
    margin-bottom:15px;
    border-radius:6px;
    border:1px solid #ccc;
}
button{
    background:black;
    color:white;
    padding:12px;
    width:100%;
    border:none;
    border-radius:30px;
    font-size:16px;
    cursor:pointer;
    margin-bottom:10px;
}
button:hover{
    background:#333;
}
</style>
</head>
<body>

<div class="container">
<h2>Styvora Landing Page Generator</h2>

<input type="text" id="title" placeholder="Product Title">
<input type="file" id="imageFile" accept="image/*">
<textarea id="description" placeholder="Product Description"></textarea>
<textarea id="specs" placeholder="Specifications (one per line)"></textarea>
<input type="text" id="link" placeholder="Affiliate Link">
<input type="text" id="filename" placeholder="Slug (example: product-1)">

<button onclick="generateHTML()">Generate HTML Code</button>
<button onclick="publishToGitHub()">Publish to GitHub (Auto)</button>

</div>

<script>
const WORKER_API_URL = "https://styvora-publisher.deepkoley156.workers.dev/";

let generatedCode = "";

function generateHTML(){

let title = document.getElementById("title").value.trim();
let descriptionRaw = document.getElementById("description").value.trim();
let description = descriptionRaw.replaceAll("\n","<br>");
let specs = document.getElementById("specs").value.split("\n");
let link = document.getElementById("link").value.trim();
let slug = document.getElementById("filename").value.trim();

if(!slug){
    alert("Enter slug first!");
    return;
}

let specList = "";
specs.forEach(item=>{
    if(item.trim() !== ""){
        specList += `<li>${item.trim()}</li>\n`;
    }
});

generatedCode = `
<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Styvora | ${title}</title>
<meta name="description" content="${descriptionRaw}">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:'Inter',sans-serif;
  background:#ffffff;
  color:#111;
  line-height:1.6;
}
.wrapper{
  max-width:720px;
  margin:auto;
  padding:40px 20px 120px;
}
.brand{
  text-align:center;
  font-size:14px;
  letter-spacing:2px;
  text-transform:uppercase;
  margin-bottom:40px;
  color:#777;
}
.product-image{
  width:100%;
  border-radius:6px;
  margin-bottom:35px;
}
h1{
  font-size:26px;
  font-weight:500;
  margin-bottom:15px;
}
.description{
  font-size:15px;
  color:#444;
  margin-bottom:30px;
}
.features{
  margin-bottom:40px;
}
.features li{
  list-style:none;
  margin-bottom:10px;
  font-size:14px;
  color:#333;
}
.features li:before{
  content:"– ";
}
.cta{
  display:inline-block;
  padding:14px 36px;
  border:1px solid #111;
  text-decoration:none;
  color:#111;
  font-weight:500;
  transition:0.3s ease;
}
.cta:hover{
  background:#111;
  color:#fff;
}
.sticky{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  background:#fff;
  padding:15px;
  border-top:1px solid #eee;
}
.sticky a{
  display:block;
  text-align:center;
  padding:14px;
  background:#111;
  color:#fff;
  text-decoration:none;
  font-weight:500;
}
@media(min-width:768px){
  .sticky{display:none;}
}
</style>
</head>

<body>

<div class="wrapper">

<div class="brand">
Styvora | Women’s Fashion & Accessories
</div>

<img src="images/${slug}.jpg" class="product-image" alt="${title}">

<h1>${title}</h1>

<p class="description">
${description}
</p>

<ul class="features">
${specList}
</ul>

<a href="${link}" target="_blank" class="cta">
Buy Now
</a>

</div>

<div class="sticky">
<a href="${link}" target="_blank">
Buy Now
</a>
</div>

</body>
</html>
`;

alert("Minimalist Landing Page Generated Successfully!");
}

async function publishToGitHub(){

let slug = document.getElementById("filename").value.trim();
let imageFile = document.getElementById("imageFile").files[0];
let title = document.getElementById("title").value.trim();
let description = document.getElementById("description").value.trim();

if(!slug){
    alert("Enter slug!");
    return;
}

if(!generatedCode){
    alert("Generate HTML first!");
    return;
}

if(!imageFile){
    alert("Select image!");
    return;
}

if(!title || !description){
    alert("Title and description required!");
    return;
}

let reader = new FileReader();
reader.readAsDataURL(imageFile);

reader.onload = async function(){

    let base64Image = reader.result.split(",")[1];

    try{

        let response = await fetch(WORKER_API_URL,{
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({
                slug: slug,
                title: title,
                description: description,
                content: generatedCode,
                imageContent: base64Image
            })
        });

        let result = await response.json();

        if(result.success){
            alert("Published Successfully!\n\nPage: " + result.url + "\n\nRSS: " + result.rss);
        }else{
            alert("Error: " + result.error);
        }

    }catch(error){
        alert("Publish Failed:\n" + error.message);
    }

};

}
</script>

</body>
</html>
