<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Styvora Landing Page Generator</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f4f4;
    padding:20px;
}
.container{
    max-width:700px;
    margin:auto;
    background:#fff;
    padding:20px;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}
h2{
    text-align:center;
    margin-bottom:20px;
}
input, textarea{
    width:100%;
    padding:10px;
    margin-bottom:15px;
    border-radius:6px;
    border:1px solid #ccc;
}
button{
    background:black;
    color:white;
    padding:12px;
    width:100%;
    border:none;
    border-radius:30px;
    font-size:16px;
    cursor:pointer;
}
button:hover{
    background:#333;
}
#downloadBtn{
    margin-top:10px;
    display:none;
    background:#28a745;
}
#publishBtn{
    margin-top:10px;
    background:#007bff;
}
</style>
</head>
<body>

<div class="container">
<h2>Styvora Landing Page Generator</h2>

<input type="text" id="title" placeholder="Product Title">
<input type="text" id="image" placeholder="Image File Name (example: image1.jpg)">
<textarea id="description" placeholder="Product Description"></textarea>
<textarea id="specs" placeholder="Specifications (one per line)"></textarea>
<input type="text" id="link" placeholder="Affiliate Link">
<input type="text" id="filename" placeholder="Slug (example: product-1)">

<button onclick="generateHTML()">Generate HTML Code</button>
<button id="downloadBtn" onclick="downloadFile()">Download HTML File</button>
<button id="publishBtn" onclick="publishToGitHub()">Publish to GitHub (Auto)</button>

</div>

<script>

const WORKER_API_URL = "https://styvora-publisher.deepkoley156.workers.dev/api/publish";

let generatedCode = "";

function generateHTML(){

let title = document.getElementById("title").value.trim();
let image = document.getElementById("image").value.trim();
let description = document.getElementById("description").value
                    .trim()
                    .replaceAll("\n","<br>");
let specs = document.getElementById("specs").value.split("\n");
let link = document.getElementById("link").value.trim();

let specList = "";
specs.forEach(item=>{
    if(item.trim() !== ""){
        specList += `<li>${item.trim()}</li>\n`;
    }
});

generatedCode = `
<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Styvora | ${title}</title>
<meta name="description" content="${description.replaceAll("<br>"," ")}">
</head>
<body style="font-family:Arial;padding:20px;max-width:700px;margin:auto;">

<h1>${title}</h1>

<img src="${image}" style="max-width:100%;height:auto;border-radius:8px;">

<p>${description}</p>

<ul>
${specList}
</ul>

<a href="${link}" target="_blank"
style="display:inline-block;padding:12px 20px;background:black;color:white;
text-decoration:none;border-radius:30px;margin-top:15px;">
BUY NOW
</a>

</body>
</html>
`;

alert("HTML Generated Successfully!");
document.getElementById("downloadBtn").style.display = "block";
}

function downloadFile(){
let filename = document.getElementById("filename").value.trim() || "index";
let blob = new Blob([generatedCode], {type: "text/html"});
let link = document.createElement("a");
link.href = URL.createObjectURL(blob);
link.download = filename.replace(".html","") + ".html";
link.click();
}

async function publishToGitHub(){

let slug = document.getElementById("filename").value.trim();

if(!slug){
    alert("Please enter Slug (example: product-1)");
    return;
}

if(!generatedCode){
    alert("Generate HTML first!");
    return;
}

try{

let response = await fetch(WORKER_API_URL,{
    method:"POST",
    headers:{
        "Content-Type":"application/json"
    },
    body:JSON.stringify({
        slug: slug.replace(".html",""),
        content: generatedCode
    })
});

if(!response.ok){
    throw new Error("Server error: " + response.status);
}

let result = await response.json();

alert("Published Successfully!\n\nPage URL:\n" + result.url);

}catch(error){
    alert("Publish Failed:\n" + error.message);
}

}

</script>

</body>
</html>
